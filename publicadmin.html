<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CS2 Quiz - ADMIN</title>
    <style>
        body { background: #0f1114; color: #cfd2d6; font-family: sans-serif; padding: 20px; }
        .admin-panel { border: 2px solid #de9b35; padding: 20px; border-radius: 10px; }
        button { background: #de9b35; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin: 5px; }
        .player-row { background: #2a2d32; padding: 10px; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; }
        .answer-hint { color: #50fa7b; font-size: 1.5em; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>CONTROL PANEL (HOST)</h1>
    <div class="admin-panel">
        <div id="current-q">Вопрос: ...</div>
        <div id="correct-ans" class="answer-hint">Ответ: ...</div>
        <button onclick="nextQ()">СЛЕДУЮЩИЙ ВОПРОС</button>
    </div>

    <h3>Участники (Нажми на игрока, чтобы дать балл):</h3>
    <div id="players-list"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();

        socket.on('nextQuestion', (data) => {
            document.getElementById('current-q').innerText = "Вопрос: " + data.question;
            document.getElementById('correct-ans').innerText = "ПРАВИЛЬНЫЙ ОТВЕТ: " + data.answer;
        });

        socket.on('updatePlayers', (players) => {
            const list = document.getElementById('players-list');
            list.innerHTML = Object.keys(players).map(id => `
                <div class="player-row">
                    <span>${players[id].name} (Счет: ${players[id].score})</span>
                    <button onclick="addPoint('${id}')">+1 БАЛЛ</button>
                </div>
            `).join('');
        });

        function nextQ() { socket.emit('adminNext'); }
        function addPoint(id) { socket.emit('adminAddScore', id); }
    </script>
</body>
</html>
